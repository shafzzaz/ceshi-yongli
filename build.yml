name: Build and Release Desktop App

on:
  push:
    tags:               # 当你推送一个形如 'v*' 的标签时触发，例如 'v1.0'
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]  # 为 macOS 和 Windows 同时构建

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller openai pillow pygame

    - name: Build with PyInstaller
      run: |
        # 这是核心打包命令，请将 'shu_pet.py' 替换为你的入口文件名
        pyinstaller --onefile --windowed --add-data "images/shu:images/shu" --add-data "images/shupaopao:images/shupaopao" --add-data "music:music" --add-data "audio:audio" --add-data "chat_phrases.json:." --hidden-import pygame --hidden-import openai --hidden-import PIL shu_pet.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ runner.os }}-build
        path: dist/
